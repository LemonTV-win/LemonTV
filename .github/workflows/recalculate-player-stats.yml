name: Recalculate player stats

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  recalculate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger recalculation endpoint
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://lemontv.win/api/cron/recalculate-player-stats
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
